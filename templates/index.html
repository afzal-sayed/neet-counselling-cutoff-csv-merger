<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEET PG Counselling Merger</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>NEET PG Counselling Merger</h1>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main class="app-main">

    <section id="upload-section">
      <p class="section-hint">Select all round files, then click Generate.</p>
      <div class="rounds-grid" id="rounds-grid"></div>
      <div class="generate-bar">
        <button id="generate-btn" class="btn-primary">Generate Merged Sheet</button>
      </div>
    </section>

    <section id="progress-section" class="hidden">
      <p id="stage-label" class="stage-label">Starting…</p>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span id="progress-pct" class="progress-pct">0%</span>
    </section>

    <section id="review-section" class="hidden">
      <h2>Fuzzy Match Review</h2>
      <p id="match-summary" class="match-summary"></p>
      <div class="bulk-btns">
        <button id="approve-all-btn" class="btn-secondary">Approve All</button>
        <button id="reject-all-btn"  class="btn-secondary">Reject All</button>
      </div>
      <div class="table-wrap">
        <table class="match-table" id="match-table">
          <thead>
            <tr>
              <th>Original Name</th><th>Matched To</th>
              <th>Score</th><th>Round</th><th>State</th><th>Action</th>
            </tr>
          </thead>
          <tbody id="match-tbody"></tbody>
        </table>
      </div>
      <button id="confirm-btn" class="btn-primary confirm-btn">
        Confirm &amp; Generate Final Output
      </button>
    </section>

    <section id="download-section" class="hidden">
      <h2>Download Ready</h2>
      <div class="download-btns">
        <button id="download-csv"  class="btn-download">⬇ Download CSV</button>
        <button id="download-xlsx" class="btn-download btn-download--xlsx">⬇ Download XLSX</button>
      </div>
    </section>

    <section id="error-section" class="hidden">
      <p id="error-msg" class="error-msg"></p>
      <button id="retry-btn" class="btn-secondary">Try Again</button>
    </section>

  </main>

  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <h3>Missing Rounds</h3>
      <p id="modal-msg"></p>
      <div class="modal-actions">
        <button id="modal-yes" class="btn-primary">Continue Anyway</button>
        <button id="modal-no"  class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
